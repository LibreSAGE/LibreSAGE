; MORNING ALL RED
WaterSet MORNING
  SkyTexture = TestSky.tga
  WaterTexture = TestWater.tga
  Vertex00Color = R:255 G:000 B:000
  Vertex10Color = R:255 G:000 B:000
  Vertex01Color = R:255 G:000 B:000
  Vertex11Color = R:255 G:000 B:000
  DiffuseColor   = R:255 G:000 B:000 A:255
  TransparentDiffuseColor = R:255 G:000 B:000 A:128
  UScrollPerMS = 0.002
  VScrollPerMS = 0.002
  SkyTexelsPerUnit = 0.8
  WaterRepeatCount = 32
End

